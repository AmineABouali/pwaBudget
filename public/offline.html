<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BudgetPro Offline</title>
    <meta name="theme-color" content="#0f172a" />
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.2), transparent 45%),
          #020617;
        color: #e2e8f0;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(92vw, 480px);
        padding: 32px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.88);
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.55;
        color: #cbd5e1;
      }

      button {
        margin-top: 12px;
        padding: 12px 16px;
        border: 0;
        border-radius: 999px;
        background: #2563eb;
        color: white;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>BudgetPro couldn't refresh from the network, but your installed app and local data should still work once the shell is cached.</p>
      <p>Reconnect once, open the app again, and future launches will work offline more reliably.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
  </html>
